  <title>PDF Editor</title>
  <style>
    #app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      z-index: 9999;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    #app-loader.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    .al-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      animation: al-rise 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes al-rise {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .al-icon {
      position: relative;
      width: 64px;
      height: 80px;
    }

    .al-page {
      width: 100%;
      height: 100%;
      background: #f0f6ff;
      border: 2px solid #dbeafe;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }

    .al-page::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 20px;
      height: 20px;
      background: #ffffff;
      border-left: 2px solid #dbeafe;
      border-bottom: 2px solid #dbeafe;
      border-radius: 0 0 0 6px;
      clip-path: polygon(0 0, 100% 0, 100% 100%);
      background: linear-gradient(225deg, #bfdbfe 0%, #eff6ff 50%);
    }

    .al-lines {
      position: absolute;
      top: 26px;
      left: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .al-line {
      height: 3px;
      background: #bfdbfe;
      border-radius: 2px;
      transform-origin: left center;
      animation: al-line-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .al-line:nth-child(1) {
      width: 80%;
      animation-delay: 0.15s;
    }

    .al-line:nth-child(2) {
      width: 100%;
      animation-delay: 0.25s;
    }

    .al-line:nth-child(3) {
      width: 65%;
      animation-delay: 0.35s;
    }

    .al-line:nth-child(4) {
      width: 90%;
      animation-delay: 0.45s;
    }

    @keyframes al-line-in {
      from {
        transform: scaleX(0);
        opacity: 0;
      }

      to {
        transform: scaleX(1);
        opacity: 1;
      }
    }

    .al-ring {
      position: absolute;
      inset: -14px;
      border-radius: 50%;
      border: 2.5px solid #dbeafe;
      border-top-color: #3b82f6;
      animation: al-spin 0.9s linear infinite;
    }

    @keyframes al-spin {
      to {
        transform: rotate(360deg);
      }
    }

    .al-sub {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 12px;
      color: #94a3b8;
      letter-spacing: 0.5px;
      margin-top: -18px;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .al-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #cbd5e1;
      animation: al-bounce 1.2s ease-in-out infinite;
    }

    .al-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .al-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes al-bounce {

      0%,
      80%,
      100% {
        transform: scale(1);
        opacity: 0.4;
      }

      40% {
        transform: scale(1.6);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div id="app-loader">
    <div class="al-card">
      <div class="al-icon">
        <div class="al-page">
          <div class="al-lines">
            <div class="al-line"></div>
            <div class="al-line"></div>
            <div class="al-line"></div>
            <div class="al-line"></div>
          </div>
        </div>
        <div class="al-ring"></div>
      </div>
      <div class="al-sub">
        Loading
        <div class="al-dot"></div>
        <div class="al-dot"></div>
        <div class="al-dot"></div>
      </div>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
